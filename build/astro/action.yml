name: Build Astro Site
description: Build a site with Astro using npm

inputs:
  source-directory:
    description: "Source directory containing the Astro project"
    required: false
    default: "."

runs:
  using: "composite"
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "22"
        cache: "npm"
        cache-dependency-path: ${{ inputs.source-directory }}/package-lock.json

    - name: Install Dependencies
      shell: bash
      working-directory: ${{ inputs.source-directory }}
      run: npm ci

    - name: Build Astro site
      shell: bash
      working-directory: ${{ inputs.source-directory }}
      run: npm run build
